<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Saurabh Kumar</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .error-wrap {
      padding: 2rem;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 14rem);
      line-height: 1;
      color: var(--border-strong);
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .error-msg {
      font-size: var(--ts-sm);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }
    .error-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: var(--ts-sm);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <p class="error-msg">This state is missing. Let's find it.</p>
    <a href="/" class="error-link">
      Back to Home
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</body>
</html>
